<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joe Longacre — Vancouver Real Estate</title>
  <meta name="description" content="Joe Longacre is a Vancouver real estate agent with Macdonald Realty. Where You Live Matters.">
  <style>
    /* --- RESET & BASE --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    /* --- TOKENS --- */
    :root {
      --warm-black:   #2c2420;
      --deep-dark:    #1e1a16;
      --darkest-dark: #1a1510;
      --cream:        #f7f2eb;
      --white:        #ffffff;
      --gold:         #c9a96e;
      --slate-brown:  #8b7355;
      --mid-brown:    #5a4e44;
      --trend-green:  #5a7a60;
      --trend-red:    #a05a50;

      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans:  'Helvetica Neue', Helvetica, Arial, sans-serif;

      --max-width: 1200px;
      --section-pad: 120px 60px;
    }

    body {
      font-family: var(--font-serif);
      background: var(--cream);
      color: var(--warm-black);
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>

</body>
</html>
