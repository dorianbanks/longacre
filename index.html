<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joe Longacre — Vancouver Real Estate</title>
  <meta name="description" content="Joe Longacre is a Vancouver real estate agent with Macdonald Realty. Where You Live Matters.">
  <style>
    /* --- RESET & BASE --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    /* --- TOKENS --- */
    :root {
      --warm-black:   #2c2420;
      --deep-dark:    #1e1a16;
      --darkest-dark: #1a1510;
      --cream:        #f7f2eb;
      --white:        #ffffff;
      --gold:         #c9a96e;
      --slate-brown:  #8b7355;
      --mid-brown:    #5a4e44;
      --trend-green:  #5a7a60;
      --trend-red:    #a05a50;

      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans:  'Helvetica Neue', Helvetica, Arial, sans-serif;

      --max-width: 1200px;
      --section-pad: 120px 60px;
    }

    body {
      font-family: var(--font-serif);
      background: var(--cream);
      color: var(--warm-black);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* --- NAV --- */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #site-header.scrolled {
      background: var(--cream);
      box-shadow: 0 1px 20px rgba(44,36,32,0.1);
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 60px;
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .nav-logo {
      font-family: var(--font-serif);
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--white);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-logo span { color: var(--gold); }
    #site-header.scrolled .nav-logo { color: var(--warm-black); }
    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .nav-links a {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }
    #site-header.scrolled .nav-links a { color: var(--mid-brown); }
    #site-header.scrolled .nav-links a:hover { color: var(--gold); }
    .nav-cta {
      border: 1px solid rgba(255,255,255,0.5) !important;
      padding: 9px 20px !important;
      border-radius: 2px;
    }
    #site-header.scrolled .nav-cta {
      border-color: var(--slate-brown) !important;
    }

    /* --- HERO --- */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: flex-end;
      padding: 0 60px 100px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(28,20,12,0.25) 0%,
        rgba(28,20,12,0.05) 40%,
        rgba(28,20,12,0.72) 100%
      );
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 680px;
    }
    .hero-eyebrow {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }
    .hero-title {
      font-size: 72px;
      line-height: 1.0;
      font-weight: normal;
      color: var(--white);
      margin-bottom: 28px;
      letter-spacing: -1px;
    }
    .hero-title em {
      color: var(--gold);
      font-style: italic;
    }
    .hero-sub {
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.7;
      color: rgba(255,255,255,0.78);
      max-width: 500px;
      margin-bottom: 44px;
    }
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    /* --- BUTTONS --- */
    .btn-primary {
      display: inline-block;
      background: var(--gold);
      color: #1a1008;
      padding: 15px 36px;
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover {
      background: #dbb97e;
      transform: translateY(-1px);
    }
    .btn-ghost {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.45);
      padding-bottom: 3px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .btn-ghost-dark {
      color: var(--slate-brown);
      border-bottom: 1px solid var(--gold);
    }
    .btn-ghost-dark:hover {
      color: var(--gold);
    }

    /* --- SCROLL INDICATOR --- */
    .hero-scroll {
      position: absolute;
      bottom: 36px;
      right: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 2;
    }
    .hero-scroll span {
      font-family: var(--font-sans);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      writing-mode: vertical-rl;
    }
    .hero-scroll-line {
      width: 1px;
      height: 54px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
    }
  </style>
</head>
<body>
  <header id="site-header">
    <nav class="nav">
      <a href="#" class="nav-logo">JOE <span>LONGACRE</span></a>
      <div class="nav-links">
        <a href="#listings">Listings</a>
        <a href="#neighbourhoods">Neighbourhoods</a>
        <a href="#about">About</a>
        <a href="#market">Market</a>
        <a href="#contact" class="nav-cta">Get in Touch</a>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-bg">
      <img
        src="https://images.unsplash.com/photo-1560179707-f14e90ef3623?w=1800&q=80"
        alt="Vancouver skyline at dusk"
      >
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Vancouver Real Estate · Macdonald Realty</p>
      <h1 class="hero-title">Where You<br>Live <em>Matters.</em></h1>
      <p class="hero-sub">Vancouver's neighbourhoods each have a soul of their own. Joe Longacre has spent years learning them — so you can find yours.</p>
      <div class="hero-actions">
        <a href="#listings" class="btn-primary">View Listings</a>
        <a href="#about" class="btn-ghost">Meet Joe →</a>
      </div>
    </div>
    <div class="hero-scroll">
      <div class="hero-scroll-line"></div>
      <span>Scroll</span>
    </div>
  </section>
</body>
</html>
